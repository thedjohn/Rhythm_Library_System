<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Library System</title>
    <base href="/" />
    <script>
        // GitHub Pages SPA routing — store the path and redirect to index
        var l = window.location;
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash);
    </script>
</head>
<body></body>
</html>
