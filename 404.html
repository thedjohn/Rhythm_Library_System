    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FCG7CNYZEW"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="RhythmLibraryWeb.styles.css" rel="stylesheet" />
    <style>
        #rotate-msg {
            display: none;
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            color: #fff;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 9999;
            text-align: center;
            padding: 32px;
        }
        @media (max-width: 599px) and (orientation: portrait) {
            #rotate-msg { display: flex; }
        }
    </style>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x1F5D9;</span>
    </div>
    <div id="rotate-msg">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="18" y="8" width="28" height="48" rx="4" stroke="#2979ff" stroke-width="3"/>
            <path d="M8 40 C8 28 20 16 36 14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none" stroke-dasharray="4 3"/>
            <path d="M36 14 L30 10 M36 14 L32 20" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <p style="font-size:1.1rem; font-weight:600; margin:0;">Rotate your device to landscape</p>
        <p style="font-size:0.85rem; color:#90caf9; margin:0; max-width:320px; line-height:1.6;">
            This app displays music notation that requires a wider screen to be readable.
            Please rotate your device to landscape mode to continue.
        </p>
    </div>

    <script src="js/audio.js?v=3"></script>
    <script src="js/notation.js?v=3"></script>
    <script>
        function checkOrientation() {
            var el = document.getElementById('rotate-msg');
            if (!el) return;
            var minDim = Math.min(screen.width, screen.height);
            var isPhone = minDim < 600;
            var isPortrait = window.innerHeight > window.innerWidth;
            el.style.display = (isPhone && isPortrait) ? 'flex' : 'none';
        }
        checkOrientation();
        window.addEventListener('orientationchange', function() { setTimeout(checkOrientation, 300); });
        window.addEventListener('resize', checkOrientation);
        if (window.ResizeObserver) {
            new ResizeObserver(checkOrientation).observe(document.documentElement);
        }
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
