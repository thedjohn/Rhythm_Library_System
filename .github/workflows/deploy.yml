name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish RhythmLibraryWeb.csproj -c Release -o publish

      - name: Set base href for /app/ path
        run: sed -i 's|<base href="/" />|<base href="/app/" />|g' publish/wwwroot/index.html

      - name: Copy entire app to /app subdirectory
        run: cp -r publish/wwwroot publish/wwwroot-copy && mkdir -p publish/wwwroot/app && cp -r publish/wwwroot-copy/. publish/wwwroot/app/

      - name: Set landing page as root index
        run: cp publish/wwwroot/app/landing.html publish/wwwroot/index.html

      - name: SPA 404 fallback points to app
        run: cp publish/wwwroot/app/index.html publish/wwwroot/404.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot
          cname: www.rhythmlibrarysystem.com