name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish RhythmLibraryWeb.csproj -c Release -o publish

      - name: Set base href for /app/ path
        run: sed -i 's|<base href="/" />|<base href="/app/" />|g' publish/wwwroot/index.html

      - name: Set up /app directory
        run: |
          mkdir -p publish/wwwroot/app
          cp -r publish/wwwroot/_framework publish/wwwroot/app/
          cp -r publish/wwwroot/js publish/wwwroot/app/
          cp -r publish/wwwroot/css publish/wwwroot/app/
          cp -r publish/wwwroot/lib publish/wwwroot/app/
          cp publish/wwwroot/index.html publish/wwwroot/app/index.html
          cp publish/wwwroot/favicon.png publish/wwwroot/app/ 2>/dev/null || true
          cp publish/wwwroot/RhythmLibraryWeb.styles.css publish/wwwroot/app/ 2>/dev/null || true

      - name: Set landing page as root
        run: cp publish/wwwroot/landing.html publish/wwwroot/index.html

      - name: SPA 404 fallback
        run: cp publish/wwwroot/app/index.html publish/wwwroot/404.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot
          cname: www.rhythmlibrarysystem.com